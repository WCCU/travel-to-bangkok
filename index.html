<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🇹🇭 曼谷旅遊清單</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Noto+Serif+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root { --gold: #A07828; --bg: #F7F3EC; --card: #FFFFFF; --card-border: #E2D9C8; --text: #2C2318; --muted: #9A8A6A; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'Noto Serif TC', serif; min-height: 100vh; }
  .nav { position: sticky; top: 0; z-index: 100; background: rgba(247,243,236,0.95); backdrop-filter: blur(8px); border-bottom: 1px solid var(--card-border); display: flex; justify-content: center; gap: 5px; padding: 10px; }
  .nav-btn { font-family: inherit; font-size: 13px; color: var(--muted); background: transparent; border: 1px solid transparent; border-radius: 30px; padding: 8px 16px; cursor: pointer; }
  .nav-btn.active { color: var(--gold); background: var(--card); border-color: var(--card-border); font-weight: 700; }
  .page { display: none; }
  .page.active { display: block; }
  .container { max-width: 600px; margin: 0 auto; padding: 30px 20px 80px; }
  .header { text-align: center; margin-bottom: 30px; }
  .header h1 { font-family: 'Playfair Display', serif; font-size: 32px; color: var(--gold); margin-bottom: 5px; }
  .day-block { margin-bottom: 25px; background: var(--card); border: 1px solid var(--card-border); border-radius: 12px; overflow: hidden; }
  .day-header { display: flex; align-items: center; gap: 10px; padding: 12px 15px; background: #FDF8F0; border-bottom: 1px solid var(--card-border); }
  .day-badge { font-size: 12px; font-weight: 700; color: white; background: var(--gold); border-radius: 20px; padding: 3px 10px; }
  .day-items { padding: 10px 15px; }
  .day-item { display: flex; gap: 12px; margin-bottom: 15px; border-bottom: 1px solid #F5F0E8; padding-bottom: 10px; }
  .day-item:last-child { border-bottom: none; }
  .day-time { font-size: 11px; color: var(--muted); width: 40px; }
  .day-place { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
  .day-note { font-size: 12px; color: var(--muted); line-height: 1.5; }
  .day-map { display: inline-block; font-size: 11px; color: var(--gold); text-decoration: none; margin-top: 5px; background: #FEF3E2; padding: 2px 8px; border-radius: 4px; }
  
  /* 記帳樣式 */
  .settle-card { background: #2A3F6E; color: white; padding: 15px; border-radius: 12px; margin-bottom: 20px; text-align: center; }
  .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
  .sum-item { background: #fff; border: 1px solid var(--card-border); padding: 10px; border-radius: 10px; text-align: center; }
  .sum-label { font-size: 11px; color: var(--muted); }
  .sum-val { font-size: 16px; font-weight: 700; color: var(--gold); }
  .exp-input { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid var(--card-border); border-radius: 8px; font-family: inherit; }
  .exp-btn { width: 100%; padding: 12px; background: var(--gold); color: white; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; }
  .exp-row { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; font-size: 13px; background: #fff; }
  .tag-person { font-size: 10px; padding: 2px 6px; border-radius: 4px; margin-right: 5px; }
  .tag-W { background: #E6F5EC; color: #2A6E4A; }
  .tag-H { background: #E6EDF5; color: #2A3F6E; }
  .tag-S { background: #F5EEE6; color: #6E4A2A; }
</style>
</head>
<body>

<nav class="nav">
  <button class="nav-btn active" onclick="showPage('itinerary')" id="tab-itinerary">🗓️ 行程表</button>
  <button class="nav-btn" onclick="showPage('expense')" id="tab-expense">💰 記帳結算</button>
</nav>

<div class="page active" id="page-itinerary">
  <div class="container">
    <div class="header"><h1>Bangkok Trip</h1><p>2026.04.29 — 05.03</p></div>

    <div class="day-block">
      <div class="day-header"><div class="day-badge">Day 1</div><div>4/29 (三) 抵達</div></div>
      <div class="day-items">
        <div class="day-item"><div class="day-time">12:00</div><div><div class="day-place">✈️ 抵達機場</div><a class="day-map" href="https://maps.app.goo.gl/kXvJ2N2C3G" target="_blank">📍 地圖</a></div></div>
        <div class="day-item"><div class="day-time">16:00</div><div><div class="day-place">🍲 Jeh O Chula (已預約)</div><a class="day-map" href="https://maps.app.goo.gl/T4X1" target="_blank">📍 地圖</a></div></div>
        <div class="day-item"><div class="day-time">20:00</div><div><div class="day-place">🍹 Bar Us (預約碼 M8X15K)</div><a class="day-map" href="maps.app.goo.gl/k4C5D6R8N1H9M5Y7" target="_blank">📍 地圖</a></div></div>
      </div>
    </div>
    <div class="day-block">
      <div class="day-header"><div class="day-badge">Day 2-5</div><div>景點清單</div></div>
      <div class="day-items">
        <div class="day-item"><div class="day-place">👘 泰服體驗 & 鄭王廟</div><a class="day-map" href="https://maps.app.goo.gl/x8C5K3D6R" target="_blank">📍 地圖</a></div>
        <div class="day-item"><div class="day-place">🌅 Supanniga 夕陽餐廳</div><a class="day-map" href="https://maps.app.goo.gl/Y8C5K" target="_blank">📍 地圖</a></div>
        <div class="day-item"><div class="day-place">🚢 ICONSIAM / 🛒 恰圖恰</div><a class="day-map" href="https://maps.app.goo.gl/M8" target="_blank">📍 地圖</a></div>
      </div>
    </div>
  </div>
</div>

<div class="page" id="page-expense">
  <div class="container">
    <div class="settle-card">
      <div style="font-size:12px; opacity:0.8;">最終結算結果</div>
      <div id="settlement-msg" style="font-size:18px; font-weight:700; margin-top:5px;">計算中...</div>
    </div>

    <div class="summary-grid">
      <div class="sum-item"><div class="sum-label">Winnie 付的</div><div class="sum-val" id="sum-W">0</div></div>
      <div class="sum-item"><div class="sum-label">懷安 付的</div><div class="sum-val" id="sum-H">0</div></div>
    </div>

    <div id="expense-list" style="margin-bottom:20px;"></div>

    <div style="background:#fff; padding:15px; border-radius:12px; border:1px solid var(--card-border);">
      <select id="exp-p" class="exp-input">
        <option value="W">Winnie 付的</option>
        <option value="H">懷安 付的</option>
        <option value="S">共同支出 (各半)</option>
      </select>
      <input type="text" id="exp-d" class="exp-input" placeholder="項目說明">
      <input type="number" id="exp-a" class="exp-input" placeholder="金額 (TWD)">
      <button onclick="addExp()" class="exp-btn">新增紀錄</button>
      <button onclick="clearExp()" style="background:none; border:none; color:red; font-size:11px; margin-top:10px; cursor:pointer;">清空所有資料</button>
    </div>
  </div>
</div>

<script>
  function showPage(p) {
    document.querySelectorAll('.page').forEach(el=>el.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(el=>el.classList.remove('active'));
    document.getElementById('page-'+p).classList.add('active');
    document.getElementById('tab-'+p).classList.add('active');
  }

  let exps = JSON.parse(localStorage.getItem('bkk_final_v1')) || [];

  function addExp() {
    const p = document.getElementById('exp-p').value;
    const d = document.getElementById('exp-d').value;
    const a = parseFloat(document.getElementById('exp-a').value);
    if(!d || !a) return;
    exps.push({p, d, a});
    localStorage.setItem('bkk_final_v1', JSON.stringify(exps));
    document.getElementById('exp-d').value = '';
    document.getElementById('exp-a').value = '';
    render();
  }

  function clearExp() { if(confirm('確定要清空嗎？')) { exps = []; localStorage.removeItem('bkk_final_v1'); render(); } }

  function render() {
    const l = document.getElementById('expense-list');
    let sW = 0, sH = 0, sS = 0;
    
    l.innerHTML = exps.map((e, i) => {
      if(e.p==='W') sW += e.a;
      else if(e.p==='H') sH += e.a;
      else sS += e.a;
      
      const pName = e.p==='W'?'Winnie':(e.p==='H'?'懷安':'共同');
      return `<div class="exp-row">
        <span><span class="tag-person tag-${e.p}">${pName}</span>${e.d}</span>
        <b>$${e.a}</b>
      </div>`;
    }).join('');

    document.getElementById('sum-W').innerText = '$' + sW;
    document.getElementById('sum-H').innerText = '$' + sH;

    // 結算邏輯：共同支出各出一半，算出誰領先多少
    // 懷安應付 = (共同/2) + Winnie代付
    // Winnie應付 = (共同/2) + 懷安代付
    const diff = (sW - sH).toFixed(0);
    const msg = document.getElementById('settlement-msg');
    if (diff > 0) msg.innerText = `懷安 應給 Winnie $${Math.abs(diff)}`;
    else if (diff < 0) msg.innerText = `Winnie 應給 懷安 $${Math.abs(diff)}`;
    else msg.innerText = `雙方帳目平衡`;
  }
  render();
</script>
</body>
</html>
